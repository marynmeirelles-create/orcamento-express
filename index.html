<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orçamento Express</title>
  <meta name="theme-color" content="#FF7BAC">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Orçamento Express">
  <link rel="apple-touch-icon" href="/icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Poppins',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at top left,#FFF5F7 0%,#FFE4F0 40%,#F0EDFF 100%);}
    .card{width:100%;max-width:380px;background:#fff;border-radius:28px;padding:32px 26px 34px;box-shadow:0 14px 40px rgba(140,123,255,0.18);text-align:center;}
    .logo{width:140px;height:140px;object-fit:contain;margin-bottom:16px;border-radius:20px;}
    .logo-fallback{width:140px;height:140px;border-radius:20px;background:linear-gradient(135deg,#FF7BAC,#8C7BFF);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:48px;}
    h1{font-size:20px;font-weight:800;color:#8C7BFF;margin-bottom:4px;}
    p.sub{font-size:13px;color:#a08fc7;margin-bottom:24px;}
    label{display:block;text-align:left;font-size:12px;font-weight:600;color:#7a6c9f;margin-bottom:5px;}
    .pw-wrap{position:relative;margin-bottom:12px;}
    input[type=password],input[type=text]{width:100%;padding:12px 80px 12px 16px;border-radius:999px;border:1.5px solid #E8E8F3;font-family:'Poppins',sans-serif;font-size:14px;outline:none;transition:.2s;}
    input:focus{border-color:#FF7BAC;box-shadow:0 0 0 3px rgba(255,123,172,.15);}
    .toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;border-radius:999px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;background:#F0EDFF;color:#7a3a6b;font-family:'Poppins',sans-serif;}
    .lembrar{display:flex;align-items:center;gap:8px;font-size:12px;color:#7a6c9f;margin-bottom:20px;cursor:pointer;user-select:none;text-align:left;}
    .lembrar input{accent-color:#FF7BAC;width:15px;height:15px;flex-shrink:0;}
    .btn{width:100%;padding:13px;border:none;border-radius:999px;background:linear-gradient(90deg,#FF7BAC,#8C7BFF);color:#fff;font-family:'Poppins',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(255,123,172,.35);}
    .erro{font-size:12px;color:#c73232;margin-top:10px;min-height:18px;}
  </style>
</head>
<body>
<div class="card">
  <img class="logo" src="/icon.png" alt="Orçamento Express"
    onerror="this.style.display='none';document.getElementById('logoFallback').style.display='flex'">
  <div class="logo-fallback" id="logoFallback" style="display:none">💌</div>
  <h1>Orçamento Express</h1>
  <p class="sub">Gere orçamentos e envie no WhatsApp</p>
  <label for="senha">Senha de acesso</label>
  <div class="pw-wrap">
    <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="off">
    <button class="toggle" type="button" id="toggle">Mostrar</button>
  </div>
  <label class="lembrar">
    <input type="checkbox" id="lembrar">
    Lembrar senha neste aparelho
  </label>
  <button class="btn" id="entrar">Entrar</button>
  <p class="erro" id="erro"></p>
</div>
<script>
  const SENHA="orcamento123";
  const inp=document.getElementById("senha");
  const chk=document.getElementById("lembrar");
  const erro=document.getElementById("erro");

  if(localStorage.getItem("orc_lembrar")==="1"){
    chk.checked=true;
    inp.value=localStorage.getItem("orc_s")||"";
  }

  document.getElementById("toggle").onclick=function(){
    const show=inp.type==="password";
    inp.type=show?"text":"password";
    this.textContent=show?"Ocultar":"Mostrar";
  };

  document.getElementById("entrar").onclick=entrar;
  inp.onkeydown=e=>{if(e.key==="Enter")entrar();};

  function entrar(){
    const s=inp.value.trim();
    if(!s){erro.textContent="Digite a senha.";return;}
    if(s!==SENHA){erro.textContent="Senha incorreta.";return;}
    erro.textContent="";
    if(chk.checked){
      localStorage.setItem("orc_lembrar","1");
      localStorage.setItem("orc_s",s);
    }else{
      localStorage.removeItem("orc_lembrar");
      localStorage.removeItem("orc_s");
    }
    localStorage.setItem("orc_auth","1");
    window.location.href="/orcamento";
  }
</script>
</body>
</html>
